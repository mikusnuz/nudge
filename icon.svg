<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4A90D9"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.25)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.05)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square (macOS icon shape) -->
  <rect x="0" y="0" width="1024" height="1024" rx="228" ry="228" fill="url(#bg)"/>

  <!-- Subtle glass overlay -->
  <rect x="0" y="0" width="1024" height="512" rx="228" ry="228" fill="url(#glass)"/>

  <!-- Window layout grid - represents window snapping -->
  <!-- Left window pane (filled/active) -->
  <rect x="148" y="208" width="340" height="608" rx="24" ry="24" fill="rgba(255,255,255,0.95)" stroke="rgba(255,255,255,1)" stroke-width="4"/>

  <!-- Right top window pane -->
  <rect x="528" y="208" width="348" height="284" rx="24" ry="24" fill="rgba(255,255,255,0.4)" stroke="rgba(255,255,255,0.7)" stroke-width="4"/>

  <!-- Right bottom window pane -->
  <rect x="528" y="532" width="348" height="284" rx="24" ry="24" fill="rgba(255,255,255,0.4)" stroke="rgba(255,255,255,0.7)" stroke-width="4"/>

  <!-- Arrow indicating "nudge" movement on the active pane -->
  <!-- Small arrow pointing right inside left pane -->
  <g transform="translate(318, 472)">
    <polygon points="0,-36 48,0 0,36" fill="rgba(74,144,217,0.8)"/>
    <rect x="-40" y="-14" width="44" height="28" rx="6" fill="rgba(74,144,217,0.8)"/>
  </g>
</svg>
